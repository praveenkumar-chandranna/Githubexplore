name: Commit Message Validation

on:
  pull_request:
    branches:
      - DEV
      - QA
      - UAT
      - main

jobs:
  validate_commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate Commit Messages
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          # Regex pattern: ABCD-1234: message
          # 4 uppercase letters, hyphen, ticket number, colon, space, message
          # Examples: LODH-123: add account query service
          #           LODH-4567: fix null pointer
          PATTERN="^[A-Z]{4}-[0-9]+: .+"

          echo "=========================================="
          echo "COMMIT MESSAGE VALIDATION"
          echo "=========================================="
          echo "Pattern: $PATTERN"
          echo ""

          FAILED=0
          while IFS= read -r COMMIT_SHA; do
            MSG=$(git log --format=%s -n 1 "$COMMIT_SHA")
            if [[ "$MSG" =~ $PATTERN ]]; then
              echo "✅ $MSG"
            else
              echo "❌ $MSG"
              echo "   Commit: $COMMIT_SHA"
              FAILED=1
            fi
          done < <(git log --format=%H "$BASE_REF".."$HEAD_REF")

          echo ""
          if [[ "$FAILED" -eq 1 ]]; then
            echo "=========================================="
            echo "❌ COMMIT MESSAGE VALIDATION FAILED"
            echo "=========================================="
            echo ""
            echo "Expected format: ABCD-1234: message"
            echo "  - 4 uppercase letters (A-Z)"
            echo "  - hyphen (-)"
            echo "  - ticket number (digits)"
            echo "  - colon and space (: )"
            echo "  - commit message"
            echo ""
            echo "Examples:"
            echo "  LODH-123: add account query service"
            echo "  LODH-4567: fix null pointer in component"
            echo "  LODH-89: update deployment pipeline"
            exit 1
          else
            echo "✅ All commit messages are valid"
          fi
