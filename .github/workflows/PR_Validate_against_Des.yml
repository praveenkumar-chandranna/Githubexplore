name: PR Validation Against Destination Org

on:
  pull_request:
    branches:
      - SIT
      - QA
      - UAT
      - main

permissions:
  contents: read

jobs:
  check_source_branch:
    name: Check PR Source Branch
    runs-on: ubuntu-latest
    outputs:
      should_validate: ${{ steps.verify.outputs.should_validate }}
      safe_source_branch: ${{ steps.verify.outputs.safe_source_branch }}
      dest_branch: ${{ steps.verify.outputs.dest_branch }}

    steps:
      - name: Verify Source Branch
        id: verify
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_BRANCH="${{ github.head_ref }}"
          DEST_BRANCH="${{ github.base_ref }}"
          SAFE_SOURCE_BRANCH="${SOURCE_BRANCH//\//_}"

          echo "PR Source Branch: $SOURCE_BRANCH"
          echo "PR Destination Branch: $DEST_BRANCH"
          echo "Safe Source Branch: $SAFE_SOURCE_BRANCH"

          if [[ "$SOURCE_BRANCH" == "main" ]]; then
            echo "should_validate=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
          fi

          echo "safe_source_branch=$SAFE_SOURCE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "dest_branch=$DEST_BRANCH" >> "$GITHUB_OUTPUT"

  notify_main_skip:
    name: Notify - Validation Skipped
    needs: check_source_branch
    if: needs.check_source_branch.outputs.should_validate == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Validation Skipped
        shell: bash
        run: |
          echo "=========================================="
          echo "⚠️ VALIDATION SKIPPED"
          echo "PR from 'main' branch detected"
          echo "Policy: PRs from 'main' branch bypass validation"
          echo "=========================================="

  Pre_Validation_Build:
    name: Pre Validation Build
    needs: check_source_branch
    if: needs.check_source_branch.outputs.should_validate == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Runtime Versions
        shell: bash
        run: |
          set -euo pipefail
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"

      - name: Install Salesforce CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @salesforce/cli
          sf --version

      - name: Generate JWT Key File
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.SALESFORCE_JWT_SECRET_KEY }}" > server.key
          chmod 600 server.key

      - name: Inspect JWT Key File
        shell: bash
        run: |
          set -euo pipefail
          echo "JWT key file size: $(wc -c < server.key) bytes"
          echo "JWT key first line: $(head -n 1 server.key)"
          echo "JWT key last line: $(tail -n 1 server.key)"

      - name: Clear Existing Salesforce Auth
        shell: bash
        run: |
          set -euo pipefail
          sf org logout --all --no-prompt || true
          rm -rf ~/.sf ~/.sfdx || true

      - name: Set Source and Destination Branch
        shell: bash
        run: |
          set -euo pipefail
          echo "SOURCE_BRANCH=${{ github.head_ref }}" >> "$GITHUB_ENV"
          echo "SAFE_SOURCE_BRANCH=${{ needs.check_source_branch.outputs.safe_source_branch }}" >> "$GITHUB_ENV"
          echo "DEST_BRANCH=${{ github.base_ref }}" >> "$GITHUB_ENV"

      - name: Select Salesforce Org Based on Destination Branch
        shell: bash
        run: |
          set -euo pipefail

          case "$DEST_BRANCH" in
            SIT)
              echo "SF_USERNAME=${{ secrets.SFDX_AUTH_SIT_USERNAME }}" >> "$GITHUB_ENV"
              echo "SF_INSTANCE_URL=https://test.salesforce.com" >> "$GITHUB_ENV"
              echo "SF_CLIENT_ID=${{ secrets.SALESFORCE_CONSUMER_KEY_SIT }}" >> "$GITHUB_ENV"
              echo "TARGET_ORG=SIT" >> "$GITHUB_ENV"
              ;;
            QA)
              echo "SF_USERNAME=${{ secrets.SFDX_AUTH_QA_USERNAME }}" >> "$GITHUB_ENV"
              echo "SF_INSTANCE_URL=https://test.salesforce.com" >> "$GITHUB_ENV"
              echo "SF_CLIENT_ID=${{ secrets.SALESFORCE_CONSUMER_KEY_QA }}" >> "$GITHUB_ENV"
              echo "TARGET_ORG=QA" >> "$GITHUB_ENV"
              ;;
            UAT)
              echo "SF_USERNAME=${{ secrets.SFDX_AUTH_UAT_USERNAME }}" >> "$GITHUB_ENV"
              echo "SF_INSTANCE_URL=https://test.salesforce.com" >> "$GITHUB_ENV"
              echo "SF_CLIENT_ID=${{ secrets.SALESFORCE_CONSUMER_KEY_UAT }}" >> "$GITHUB_ENV"
              echo "TARGET_ORG=UAT" >> "$GITHUB_ENV"
              ;;
            main)
              echo "SF_USERNAME=${{ secrets.SFDX_AUTH_PROD_USERNAME }}" >> "$GITHUB_ENV"
              echo "SF_INSTANCE_URL=https://login.salesforce.com" >> "$GITHUB_ENV"
              echo "SF_CLIENT_ID=${{ secrets.SALESFORCE_CONSUMER_KEY_PROD }}" >> "$GITHUB_ENV"
              echo "TARGET_ORG=PRODUCTION" >> "$GITHUB_ENV"
              ;;
            *)
              echo "❌ Invalid target branch: $DEST_BRANCH"
              exit 1
              ;;
          esac

      - name: Debug Auth Configuration
        shell: bash
        run: |
          set -euo pipefail
          echo "SOURCE_BRANCH=$SOURCE_BRANCH"
          echo "SAFE_SOURCE_BRANCH=$SAFE_SOURCE_BRANCH"
          echo "DEST_BRANCH=$DEST_BRANCH"
          echo "TARGET_ORG=$TARGET_ORG"
          echo "SF_USERNAME=$SF_USERNAME"
          echo "SF_INSTANCE_URL=$SF_INSTANCE_URL"
          echo "SF_CLIENT_ID length: ${#SF_CLIENT_ID}"

      - name: Authenticate Salesforce Using JWT
        shell: bash
        run: |
          set -u

          rm -f auth-result.txt || true
          AUTH_EXIT_CODE=1

          for i in 1 2 3; do
            echo "JWT auth attempt $i..."

            if sf org login jwt \
              --client-id "$SF_CLIENT_ID" \
              --jwt-key-file server.key \
              --username "$SF_USERNAME" \
              --instance-url "$SF_INSTANCE_URL" \
              --alias targetOrg \
              --json > auth-result.txt 2>&1
            then
              AUTH_EXIT_CODE=0
              break
            else
              AUTH_EXIT_CODE=$?
              echo "Attempt $i failed with exit code $AUTH_EXIT_CODE"
              sleep $((i * 5))
            fi
          done

          echo "AUTH_EXIT_CODE=$AUTH_EXIT_CODE" >> "$GITHUB_ENV"

      - name: Show Auth Result
        shell: bash
        run: |
          echo "=========================================="
          echo "AUTH RESULT"
          echo "=========================================="
          cat auth-result.txt || true
          echo "=========================================="
          echo "Auth exit code: ${AUTH_EXIT_CODE:-unknown}"
          echo "=========================================="

          if [[ "${AUTH_EXIT_CODE:-1}" -ne 0 ]]; then
            echo "❌ Salesforce JWT authentication failed"
            exit 1
          fi

      - name: Verify Authenticated Org
        shell: bash
        run: |
          set -euo pipefail
          sf org display --target-org targetOrg

      - name: Check if Package Manifest Exists
        id: check_package
        shell: bash
        run: |
          set -euo pipefail
          PKG_MANIFEST="${GITHUB_WORKSPACE}/manifest/${SAFE_SOURCE_BRANCH}_package.xml"

          echo "Checking for package manifest at: $PKG_MANIFEST"

          if [[ -f "$PKG_MANIFEST" ]]; then
            echo "package_exists=true" >> "$GITHUB_OUTPUT"
            echo "package_path=$PKG_MANIFEST" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Package manifest not found"
            echo "Expected location: $PKG_MANIFEST"
            echo "Please ensure the following file exists in your repository:"
            echo "  manifest/${SAFE_SOURCE_BRANCH}_package.xml"
            exit 1
          fi

      - name: Prepare Test Classes
        id: prepare_manifest
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_PATH="${{ steps.check_package.outputs.package_path }}"
          TEST_CLASS_FILE="${GITHUB_WORKSPACE}/manifest/${SAFE_SOURCE_BRANCH}_TestClass.txt"

          echo "Checking for test class file at: $TEST_CLASS_FILE"

          if [[ -f "$TEST_CLASS_FILE" ]]; then
            TEST_CLASSES=$(tr '\n' ' ' < "$TEST_CLASS_FILE" | xargs)

            if [[ -z "$TEST_CLASSES" ]]; then
              echo "❌ Test class file is empty"
              exit 1
            fi

            echo "✅ Test class file found"
            echo "✅ Test classes detected: $TEST_CLASSES"
            echo "test_classes=$TEST_CLASSES" >> "$GITHUB_OUTPUT"
            echo "test_level=RunSpecifiedTests" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Test class file not found"
            echo "Expected location: $TEST_CLASS_FILE"
            echo "Validation requires a test class file with explicit test classes"
            exit 1
          fi

          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Display Validation Configuration
        shell: bash
        env:
          TEST_LEVEL: ${{ steps.prepare_manifest.outputs.test_level }}
          TEST_CLASSES: ${{ steps.prepare_manifest.outputs.test_classes }}
          MANIFEST_PATH: ${{ steps.prepare_manifest.outputs.manifest_path }}
        run: |
          echo ""
          echo "=========================================="
          echo "VALIDATION CONFIGURATION"
          echo "=========================================="
          echo "Package Manifest: $MANIFEST_PATH"
          echo "Test Level: $TEST_LEVEL"
          echo "Test Classes: $TEST_CLASSES"
          echo "=========================================="
          echo ""

      - name: Validate Deployment against Target Org
        id: validate
        shell: bash
        env:
          TEST_LEVEL: ${{ steps.prepare_manifest.outputs.test_level }}
          TEST_CLASSES: ${{ steps.prepare_manifest.outputs.test_classes }}
          MANIFEST_PATH: ${{ steps.prepare_manifest.outputs.manifest_path }}
        run: |
          set -euo pipefail

          read -ra tests_array <<< "$TEST_CLASSES"

          CMD=(sf project deploy validate
            --target-org targetOrg
            --manifest "$MANIFEST_PATH"
            --wait 60
            --ignore-warnings
            --test-level "$TEST_LEVEL"
            --verbose
          )

          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" && ${#tests_array[@]} -gt 0 ]]; then
            CMD+=(--tests)
            for test in "${tests_array[@]}"; do
              CMD+=("$test")
            done
          fi

          echo "Executing command:"
          printf '%q ' "${CMD[@]}"
          echo

          "${CMD[@]}" 2>&1 | tee deploy-result.txt
          exit_code=${PIPESTATUS[0]}

          echo "VALIDATION_EXIT_CODE=$exit_code" >> "$GITHUB_ENV"

          if [[ "$exit_code" -ne 0 ]]; then
            echo "❌ Validation command failed with exit code $exit_code"
            exit "$exit_code"
          fi

      - name: Display Validation Result
        shell: bash
        run: |
          set -euo pipefail

          echo "=========================================="
          echo "VALIDATION RESULT"
          echo "=========================================="

          if [[ "${VALIDATION_EXIT_CODE:-1}" == "0" ]]; then
            echo "✅ VALIDATION PASSED SUCCESSFULLY"
            echo "The package validation was successful!"
          else
            echo "❌ VALIDATION FAILED"
            echo "Exit Code: ${VALIDATION_EXIT_CODE:-unknown}"
            echo "Error details:"
            grep -i "error\|failed\|exception" deploy-result.txt | head -30 || true
            exit 1
          fi

      - name: Post Validation Success
        if: success()
        shell: bash
        run: |
          echo "✅ PR VALIDATION COMPLETED SUCCESSFULLY"
          echo "This PR is ready to be merged."

      - name: Post Validation Failure
        if: failure()
        shell: bash
        run: |
          echo "❌ PR VALIDATION FAILED"
          echo "Please review the validation errors above and fix the issues."

      - name: Remove JWT Key File
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f server.key
          echo "✅ JWT key file cleaned up"