name: Gitleaks Security Scan

on:
  pull_request:
    branches:
      - DEV
      - QA
      - UAT
      - main
      - hotfix

  push:
    branches:
      - DEV
      - QA
      - UAT
      - main
      - hotfix

  schedule:
    - cron: "0 6 * * 1"

  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks Scan
        run: |
          gitleaks detect --source . --config .gitleaks.toml --report-format sarif --report-path gitleaks-report.sarif --verbose
          echo "✅ No secrets detected"

      - name: Upload Scan Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 30
