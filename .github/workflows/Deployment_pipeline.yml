name: Lodha Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      Feature_Branch:
        type: string
        description: Package manifest to deploy (e.g. package name / branch name)
        required: true
      environment:
        type: choice
        description: Deployment environment
        options:
          - DEV
          - QA
          - UAT
          - PRODUCTION
          - HOTFIX
        default: DEV
        required: true
      testlevel:
        type: choice
        description: Test class run level
        options:
          - NoTestRun
          - RunLocalTests
          - RunSpecifiedTests
          - RunAllTestsInOrg
        default: RunSpecifiedTests
        required: true
      specifiedclass:
        type: string
        description: Test class names (space separated, required if RunSpecifiedTests)
        required: false

jobs:
  Deployment_Build:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'PRODUCTION' && 'PRODUCTION' || '' }}

    env:
      SF_LOGIN_URL_TEST: https://test.salesforce.com
      SF_LOGIN_URL_PROD: https://login.salesforce.com
      SF_ALIAS: lodhaOrg

    if: >
      (github.event_name == 'workflow_dispatch' &&
       (
         (github.ref == 'refs/heads/DEV' && github.event.inputs.environment == 'DEV') ||
         (github.ref == 'refs/heads/QA' && github.event.inputs.environment == 'QA') ||
         (github.ref == 'refs/heads/UAT' && github.event.inputs.environment == 'UAT') ||
         (github.ref == 'refs/heads/main' && github.event.inputs.environment == 'PRODUCTION') ||
         (github.ref == 'refs/heads/main' && github.event.inputs.environment == 'HOTFIX')
       ))

    steps:
      - name: Validate branch-environment consistency
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
          INPUT_BRANCH: ${{ github.event.inputs.Feature_Branch }}
        run: |
          DEPLOY_BRANCH="${GITHUB_REF##*/}"
          echo "Manual run: Deployment Environment=$INPUT_ENV. Package to deploy: $INPUT_BRANCH"

      - name: Set environment variables
        shell: bash
        env:
          INPUT_BRANCH: ${{ github.event.inputs.Feature_Branch }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          INPUT_TESTLEVEL: ${{ github.event.inputs.testlevel }}
          INPUT_SPECIFIEDCLASS: ${{ github.event.inputs.specifiedclass }}
        run: |
          echo "FEATURE_BRANCH=$INPUT_BRANCH" >> $GITHUB_ENV

          if [ -n "$INPUT_ENV" ]; then
            echo "ENVIRONMENT=$INPUT_ENV" >> $GITHUB_ENV
            export ENVIRONMENT="$INPUT_ENV"
          else
            case "${GITHUB_REF##*/}" in
              DEV)
                echo "ENVIRONMENT=DEV" >> $GITHUB_ENV
                export ENVIRONMENT="DEV"
                ;;
              QA)
                echo "ENVIRONMENT=QA" >> $GITHUB_ENV
                export ENVIRONMENT="QA"
                ;;
              UAT)
                echo "ENVIRONMENT=UAT" >> $GITHUB_ENV
                export ENVIRONMENT="UAT"
                ;;
              main)
                echo "ENVIRONMENT=PRODUCTION" >> $GITHUB_ENV
                export ENVIRONMENT="PRODUCTION"
                ;;
              hotfix)
                echo "ENVIRONMENT=HOTFIX" >> $GITHUB_ENV
                export ENVIRONMENT="HOTFIX"
                ;;
              *)
                echo "ERROR: Branch '${GITHUB_REF##*/}' does not map to a known environment."
                exit 1
                ;;
            esac
          fi

          if [[ -z "${ENVIRONMENT}" ]]; then
            echo "ERROR: ENVIRONMENT variable is not set or empty!"
            exit 1
          fi

          if [ -n "$INPUT_TESTLEVEL" ]; then
            echo "TEST_LEVEL=$INPUT_TESTLEVEL" >> $GITHUB_ENV
          else
            echo "TEST_LEVEL=RunSpecifiedTests" >> $GITHUB_ENV
          fi

          SPECIFIED_CLASS="$INPUT_SPECIFIEDCLASS"
          if [[ "$SPECIFIED_CLASS" == "''" ]]; then
            SPECIFIED_CLASS=""
          fi
          echo "SPECIFIED_CLASS=$SPECIFIED_CLASS" >> $GITHUB_ENV

      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version

      - name: Generate JWT private key file
        run: |
          echo "${{ secrets.SALESFORCE_JWT_SECRET_KEY }}" > server.key
          chmod 600 server.key

      - name: Set org credentials and login URL based on environment
        id: set-org
        shell: bash
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          SF_LOGIN_URL_TEST_VAL: ${{ env.SF_LOGIN_URL_TEST }}
          SF_LOGIN_URL_PROD_VAL: ${{ env.SF_LOGIN_URL_PROD }}
          KEY_DEV: ${{ secrets.SALESFORCE_CONSUMER_KEY_DEV }}
          KEY_QA: ${{ secrets.SALESFORCE_CONSUMER_KEY_QA }}
          KEY_UAT: ${{ secrets.SALESFORCE_CONSUMER_KEY_UAT }}
          KEY_PROD: ${{ secrets.SALESFORCE_CONSUMER_KEY_PROD }}
          KEY_HOTFIX: ${{ secrets.SALESFORCE_CONSUMER_KEY_HOTFIX }}
          USER_DEV: ${{ secrets.SFDX_AUTH_DEV_USERNAME }}
          USER_QA: ${{ secrets.SFDX_AUTH_QA_USERNAME }}
          USER_UAT: ${{ secrets.SFDX_AUTH_UAT_USERNAME }}
          USER_PROD: ${{ secrets.SFDX_AUTH_PROD_USERNAME }}
          USER_HOTFIX: ${{ secrets.SFDX_AUTH_HOTFIX_USERNAME }}
        run: |
          case "$ENVIRONMENT" in
            DEV)
              echo "CLIENT_ID=$KEY_DEV" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_DEV" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_TEST_VAL" >> $GITHUB_OUTPUT
              ;;
            QA)
              echo "CLIENT_ID=$KEY_QA" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_QA" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_TEST_VAL" >> $GITHUB_OUTPUT
              ;;
            UAT)
              echo "CLIENT_ID=$KEY_UAT" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_UAT" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_TEST_VAL" >> $GITHUB_OUTPUT
              ;;
            PRODUCTION)
              echo "CLIENT_ID=$KEY_PROD" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_PROD" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_PROD_VAL" >> $GITHUB_OUTPUT
              ;;
            HOTFIX)
              echo "CLIENT_ID=$KEY_HOTFIX" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_HOTFIX" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_TEST_VAL" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unsupported environment $ENVIRONMENT"
              exit 1
              ;;
          esac

      - name: Clear Prior Salesforce Sessions
        shell: bash
        run: |
          echo "🧹 Clearing existing Salesforce org sessions..."
          sf org logout --all --no-prompt || true

      - name: Authenticate to  - ${{ env.ENVIRONMENT }} Org
        env:
          CLIENT_ID: ${{ steps.set-org.outputs.CLIENT_ID }}
          USERNAME: ${{ steps.set-org.outputs.USERNAME }}
          LOGIN_URL: ${{ steps.set-org.outputs.LOGIN_URL }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
        run: |
          sf org login jwt \
            --client-id "$CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$USERNAME" \
            --instance-url "$LOGIN_URL" \
            --set-default

      - name: Fail if critical violations found
        if: |
          steps.run-scanner.outputs.exit-code > 0 ||
          steps.run-scanner.outputs.num-sev1-violations > 0 ||
          steps.run-scanner.outputs.num-violations > 10
        run: exit 0

      - name: Check Manifest Exists and Prepare test classes for RunSpecifiedTests
        id: prepare-tests
        env:
          TEST_LEVEL: ${{ env.TEST_LEVEL }}
          SPECIFIED_CLASS: ${{ env.SPECIFIED_CLASS }}
          FEATURE_BRANCH: ${{ env.FEATURE_BRANCH }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          MANIFEST="${WORKSPACE}/manifest/${FEATURE_BRANCH}_package.xml"
          if [[ ! -f "$MANIFEST" ]]; then
            echo "ERROR: Manifest file $MANIFEST not found."
            exit 1
          fi
          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" ]]; then
            if [[ -z "$SPECIFIED_CLASS" ]]; then
              TEST_CLASS_FILE="${WORKSPACE}/manifest/${FEATURE_BRANCH}_TestClass.txt"
              if [[ ! -f "$TEST_CLASS_FILE" ]]; then
                echo "ERROR: Test class file $TEST_CLASS_FILE not found and no specified class input provided."
                exit 1
              fi
              TEST_CLASSES=$(paste -sd ' ' "$TEST_CLASS_FILE")
              echo "Using test classes from file: $TEST_CLASSES"
              echo "test_classes=$TEST_CLASSES" >> $GITHUB_OUTPUT
            else
              echo "Using specified test classes: $SPECIFIED_CLASS"
              echo "test_classes=$SPECIFIED_CLASS" >> $GITHUB_OUTPUT
            fi
          else
            echo "test_classes=" >> $GITHUB_OUTPUT
          fi

      - name: Validation Deployment for salesforce - ${{ env.ENVIRONMENT }} Org
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
          FEATURE_BRANCH: ${{ env.FEATURE_BRANCH }}
          TEST_LEVEL: ${{ env.TEST_LEVEL }}
          TEST_CLASSES: ${{ steps.prepare-tests.outputs.test_classes }}
          ORG_USERNAME: ${{ steps.set-org.outputs.USERNAME }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
        run: |
          MANIFEST="${WORKSPACE}/manifest/${FEATURE_BRANCH}_package.xml"
          echo "Validating deployment of manifest: $MANIFEST"
          echo "Target Org: $ORG_USERNAME ($ENVIRONMENT)"
          echo "Test level: $TEST_LEVEL"
          echo "Test classes: $TEST_CLASSES"
          CMD=(sf project deploy validate --manifest "$MANIFEST" --target-org "$ORG_USERNAME" --test-level "$TEST_LEVEL" --wait 30 --ignore-warnings --verbose)
          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" && -n "$TEST_CLASSES" ]]; then
            CMD+=(--tests $TEST_CLASSES)
          fi
          echo "Running validation command:"
          echo "${CMD[@]}"
          "${CMD[@]}"

      - name: Deploy to Salesforce  - ${{ env.ENVIRONMENT }} Org
        id: deploy
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
          FEATURE_BRANCH: ${{ env.FEATURE_BRANCH }}
          TEST_LEVEL: ${{ env.TEST_LEVEL }}
          TEST_CLASSES: ${{ steps.prepare-tests.outputs.test_classes }}
          ORG_USERNAME: ${{ steps.set-org.outputs.USERNAME }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
        run: |
          MANIFEST="${WORKSPACE}/manifest/${FEATURE_BRANCH}_package.xml"
          echo "Deploying manifest: $MANIFEST"
          CMD=(sf project deploy start --manifest "$MANIFEST" --target-org "$ORG_USERNAME" --test-level "$TEST_LEVEL" --wait 10 --ignore-conflicts)
          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" && -n "$TEST_CLASSES" ]]; then
            CMD+=(--tests $TEST_CLASSES)
          fi
          echo "Running deploy command:"
          echo "${CMD[@]}"
          "${CMD[@]}"
          echo "deploy_status=success" >> $GITHUB_OUTPUT

      - name: Tag Release
        if: success() && env.ENVIRONMENT == 'PRODUCTION'
        run: |
          TAG="release-$(date +'%Y%m%d-%H%M%S')"
          git tag "$TAG"
          git push origin "$TAG"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV

      - name: Post-deploy Health Check
        id: health-check
        if: success() && env.ENVIRONMENT == 'PRODUCTION'
        shell: bash
        env:
          ORG_USERNAME: ${{ steps.set-org.outputs.USERNAME }}
        run: |
          echo "🔍 Running post-deploy health check..."
          RESULT=$(sf org display --target-org "$ORG_USERNAME" --json 2>&1)
          if echo "$RESULT" | jq -e '.status == 0' > /dev/null 2>&1; then
            echo "✅ Health check passed"
            echo "health_status=passed" >> $GITHUB_OUTPUT
          else
            echo "❌ Health check failed"
            echo "health_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Publish Confluence Release Notes
        if: success() && env.ENVIRONMENT == 'PRODUCTION'
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          FEATURE_BRANCH: ${{ env.FEATURE_BRANCH }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          TITLE="Release: $RELEASE_TAG - $(date +'%Y-%m-%d')"
          BODY="<h2>Release Notes</h2><ul><li><b>Tag:</b> $RELEASE_TAG</li><li><b>Feature:</b> $FEATURE_BRANCH</li><li><b>Deployed by:</b> ${{ github.actor }}</li><li><b>Date:</b> $(date +'%Y-%m-%d %H:%M:%S UTC')</li><li><b>Workflow:</b> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Run</a></li></ul>"

          curl -s -X POST \
            "${CONFLUENCE_BASE_URL}/wiki/rest/api/content" \
            -H "Content-Type: application/json" \
            -u "${CONFLUENCE_EMAIL}:${CONFLUENCE_API_TOKEN}" \
            -d "{
              \"type\": \"page\",
              \"title\": \"${TITLE}\",
              \"space\": {\"key\": \"${CONFLUENCE_SPACE_KEY}\"},
              \"ancestors\": [{\"id\": \"${CONFLUENCE_PARENT_PAGE_ID}\"}],
              \"body\": {\"storage\": {\"value\": \"${BODY}\", \"representation\": \"storage\"}}
            }" || echo "⚠️ Confluence update failed"

      - name: Trigger Rollback on Health Check Failure
        if: failure() && steps.health-check.outputs.health_status == 'failed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            echo "🔄 Triggering rollback to $PREV_TAG"
            curl -s -X POST \
              "${{ github.api_url }}/repos/${{ github.repository }}/dispatches" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"event_type\":\"health-check-failure\",\"client_payload\":{\"rollback_tag\":\"$PREV_TAG\",\"environment\":\"PRODUCTION\",\"reason\":\"Post-deploy health check failed for ${{ env.RELEASE_TAG }}\"}}"
          else
            echo "⚠️ No previous tag found for rollback"
          fi

      - name: Cleanup JWT key
        if: always()
        run: rm -f server.key

  Deploy_Hotfix_After_Prod:
    runs-on: ubuntu-latest
    needs: Deployment_Build
    if: >
      github.event.inputs.environment == 'PRODUCTION' &&
      github.ref == 'refs/heads/main'

    env:
      SF_LOGIN_URL_TEST: https://test.salesforce.com

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version

      - name: Generate JWT private key file
        run: |
          echo "${{ secrets.SALESFORCE_JWT_SECRET_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Hotfix Org
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SALESFORCE_CONSUMER_KEY_HOTFIX }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SFDX_AUTH_HOTFIX_USERNAME }}" \
            --instance-url "${{ env.SF_LOGIN_URL_TEST }}" \
            --set-default

      - name: Deploy to Hotfix Org
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
          FEATURE_BRANCH: ${{ github.event.inputs.Feature_Branch }}
          ORG_USERNAME: ${{ secrets.SFDX_AUTH_HOTFIX_USERNAME }}
        run: |
          MANIFEST="${WORKSPACE}/manifest/${FEATURE_BRANCH}_package.xml"
          echo "Deploying to HOTFIX: $MANIFEST"
          sf project deploy start --manifest "$MANIFEST" --target-org "$ORG_USERNAME" --test-level NoTestRun --wait 10 --ignore-conflicts

      - name: Cleanup JWT key
        if: always()
        run: rm -f server.key
