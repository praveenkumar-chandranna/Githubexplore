name: Lodha Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      Feature_Branch:
        type: string
        description: >
          Branch name(s) to deploy. Single: feature/ABC123  |  Multiple: feature/ABC123,feature/R-260510-0057
        required: true
      environment:
        type: choice
        description: Deployment environment
        options:
          - DEV
          - QA
          - UAT
          - PRODUCTION
          - HOTFIX
        default: DEV
        required: true
      testlevel:
        type: choice
        description: Test class run level
        options:
          - NoTestRun
          - RunLocalTests
          - RunSpecifiedTests
          - RunAllTestsInOrg
        default: RunSpecifiedTests
        required: true

jobs:
  Deployment_Build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SF_LOGIN_URL_TEST: https://test.salesforce.com
      SF_LOGIN_URL_PROD: https://login.salesforce.com
      SF_ALIAS: lodhaOrg

    if: >
      (github.event_name == 'workflow_dispatch' &&
       (
         (github.ref == 'refs/heads/DEV' && github.event.inputs.environment == 'DEV') ||
         (github.ref == 'refs/heads/QA' && github.event.inputs.environment == 'QA') ||
         (github.ref == 'refs/heads/UAT' && github.event.inputs.environment == 'UAT') ||
         (github.ref == 'refs/heads/main' && github.event.inputs.environment == 'PRODUCTION') ||
         (github.ref == 'refs/heads/main' && github.event.inputs.environment == 'HOTFIX')
       ))

    outputs:
      deploy_package: ${{ steps.resolve-package.outputs.deploy_package }}
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Validate branch-environment consistency
        shell: bash
        run: |
          echo "Manual run: Environment=${{ github.event.inputs.environment }}, Package(s)=${{ github.event.inputs.Feature_Branch }}"

      - name: Set environment variables
        id: set-env
        shell: bash
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
          INPUT_TESTLEVEL: ${{ github.event.inputs.testlevel }}
        run: |
          echo "ENVIRONMENT=$INPUT_ENV" >> $GITHUB_ENV
          echo "environment=$INPUT_ENV" >> $GITHUB_OUTPUT
          echo "TEST_LEVEL=$INPUT_TESTLEVEL" >> $GITHUB_ENV

      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Consolidate or Resolve Package
        id: resolve-package
        shell: bash
        env:
          FEATURE_INPUT: ${{ github.event.inputs.Feature_Branch }}
          MANIFEST_DIR: ${{ github.workspace }}/manifest/feature
        run: |
          FEATURE_INPUT=$(echo "$FEATURE_INPUT" | xargs)

          if [[ "$FEATURE_INPUT" == *","* ]]; then
            echo "📦 Multiple branches detected — consolidating..."

            RELEASE_DATE=$(date +'%d%m%Y')
            OUTPUT_NAME="Release_${RELEASE_DATE}"
            OUTPUT_PKG="${MANIFEST_DIR}/${OUTPUT_NAME}_package.xml"
            OUTPUT_TEST="${MANIFEST_DIR}/${OUTPUT_NAME}_TestClass.txt"

            echo "=========================================="
            echo "PACKAGE CONSOLIDATION"
            echo "=========================================="
            echo "Branches : $FEATURE_INPUT"
            echo "Output   : $OUTPUT_NAME"
            echo "=========================================="

            IFS=',' read -ra BRANCHES <<< "$FEATURE_INPUT"

            echo ""
            echo "🔍 Validating input files..."
            for BRANCH in "${BRANCHES[@]}"; do
              BRANCH=$(echo "$BRANCH" | xargs | sed 's|^feature/||')
              PKG_FILE="${MANIFEST_DIR}/${BRANCH}_package.xml"
              if [[ ! -f "$PKG_FILE" ]]; then
                echo "❌ Package file not found: $PKG_FILE"
                exit 1
              fi
              echo "  ✅ Found: ${BRANCH}_package.xml"
            done

            MAX_VERSION="0"
            ALL_MEMBERS_RAW=""

            for BRANCH in "${BRANCHES[@]}"; do
              BRANCH=$(echo "$BRANCH" | xargs | sed 's|^feature/||')
              PKG_FILE="${MANIFEST_DIR}/${BRANCH}_package.xml"
              echo "  Processing: ${BRANCH}_package.xml"

              VERSION=$(grep -oP '(?<=<version>)[^<]+' "$PKG_FILE" || echo "0")
              if awk "BEGIN {exit !($VERSION > $MAX_VERSION)}"; then
                MAX_VERSION="$VERSION"
              fi

              TYPE=""
              while IFS= read -r LINE; do
                LINE=$(echo "$LINE" | xargs)
                if [[ "$LINE" =~ \<name\>(.+)\</name\> ]]; then
                  TYPE="${BASH_REMATCH[1]}"
                elif [[ "$LINE" =~ \<members\>(.+)\</members\> ]]; then
                  MEMBER="${BASH_REMATCH[1]}"
                  ALL_MEMBERS_RAW+="${TYPE}|||${MEMBER}"$'\n'
                fi
              done < "$PKG_FILE"
            done

            printf '<?xml version="1.0" encoding="UTF-8"?>\n' > "$OUTPUT_PKG"
            printf '<Package xmlns="http://soap.sforce.com/2006/04/metadata">\n' >> "$OUTPUT_PKG"

            SORTED_TYPES=$(echo "$ALL_MEMBERS_RAW" | grep -v '^$' | cut -d'|' -f1 | sort -u)
            while IFS= read -r TYPE_NAME; do
              [[ -z "$TYPE_NAME" ]] && continue
              printf '    <types>\n' >> "$OUTPUT_PKG"
              echo "$ALL_MEMBERS_RAW" | grep -v '^$' | grep "^${TYPE_NAME}|||" | cut -d'|' -f4 | sort -u | while read -r MEMBER; do
                [[ -n "$MEMBER" ]] && printf '        <members>%s</members>\n' "$MEMBER" >> "$OUTPUT_PKG"
              done
              printf '        <name>%s</name>\n' "$TYPE_NAME" >> "$OUTPUT_PKG"
              printf '    </types>\n' >> "$OUTPUT_PKG"
            done <<< "$SORTED_TYPES"

            printf '    <version>%s</version>\n' "$MAX_VERSION" >> "$OUTPUT_PKG"
            printf '</Package>\n' >> "$OUTPUT_PKG"

            ALL_TESTS=""
            for BRANCH in "${BRANCHES[@]}"; do
              BRANCH=$(echo "$BRANCH" | xargs | sed 's|^feature/||')
              TEST_FILE="${MANIFEST_DIR}/${BRANCH}_TestClass.txt"
              if [[ -f "$TEST_FILE" ]]; then
                CONTENT=$(cat "$TEST_FILE" | tr ' ' '\n' | tr ',' '\n')
                ALL_TESTS+=$'\n'"$CONTENT"
              fi
            done

            UNIQUE_TESTS=$(echo "$ALL_TESTS" | sort -u | grep -v '^$' | tr '\n' ' ' | xargs)
            [[ -n "$UNIQUE_TESTS" ]] && echo "$UNIQUE_TESTS" > "$OUTPUT_TEST"

            echo ""
            echo "=========================================="
            echo "📦 CONSOLIDATED PACKAGE.XML"
            echo "=========================================="
            cat "$OUTPUT_PKG"
            if [[ -f "$OUTPUT_TEST" ]]; then
              echo ""
              echo "=========================================="
              echo "🧪 CONSOLIDATED TESTCLASS.TXT"
              echo "=========================================="
              cat "$OUTPUT_TEST"
            fi

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git add "${MANIFEST_DIR}/${OUTPUT_NAME}_package.xml"
            [[ -f "$OUTPUT_TEST" ]] && git add "${MANIFEST_DIR}/${OUTPUT_NAME}_TestClass.txt"
            if git diff --cached --quiet; then
              echo "⚠️ No changes to commit"
            else
              git commit -m "chore: consolidated package ${OUTPUT_NAME} [skip ci]"
              git push origin ${{ github.ref_name }}
            fi

            echo "FEATURE_BRANCH=feature/${OUTPUT_NAME}" >> $GITHUB_ENV
            echo "deploy_package=feature/${OUTPUT_NAME}" >> $GITHUB_OUTPUT
            echo "✅ Consolidation complete: $OUTPUT_NAME"

          else
            echo "📄 Single branch detected — using directly: $FEATURE_INPUT"
            FEATURE_INPUT=$(echo "$FEATURE_INPUT" | sed 's|^feature/||')
            echo "FEATURE_BRANCH=feature/${FEATURE_INPUT}" >> $GITHUB_ENV
            echo "deploy_package=feature/${FEATURE_INPUT}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version

      - name: Generate JWT private key file
        run: |
          echo "${{ secrets.SALESFORCE_JWT_SECRET_KEY }}" > server.key
          chmod 600 server.key

      - name: Set org credentials and login URL based on environment
        id: set-org
        shell: bash
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          SF_LOGIN_URL_TEST_VAL: ${{ env.SF_LOGIN_URL_TEST }}
          SF_LOGIN_URL_PROD_VAL: ${{ env.SF_LOGIN_URL_PROD }}
          KEY_DEV: ${{ secrets.SALESFORCE_CONSUMER_KEY_DEV }}
          KEY_QA: ${{ secrets.SALESFORCE_CONSUMER_KEY_QA }}
          KEY_UAT: ${{ secrets.SALESFORCE_CONSUMER_KEY_UAT }}
          KEY_PROD: ${{ secrets.SALESFORCE_CONSUMER_KEY_PROD }}
          KEY_HOTFIX: ${{ secrets.SALESFORCE_CONSUMER_KEY_HOTFIX }}
          USER_DEV: ${{ secrets.SFDX_AUTH_DEV_USERNAME }}
          USER_QA: ${{ secrets.SFDX_AUTH_QA_USERNAME }}
          USER_UAT: ${{ secrets.SFDX_AUTH_UAT_USERNAME }}
          USER_PROD: ${{ secrets.SFDX_AUTH_PROD_USERNAME }}
          USER_HOTFIX: ${{ secrets.SFDX_AUTH_HOTFIX_USERNAME }}
        run: |
          case "$ENVIRONMENT" in
            DEV)
              echo "CLIENT_ID=$KEY_DEV" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_DEV" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_TEST_VAL" >> $GITHUB_OUTPUT
              ;;
            QA)
              echo "CLIENT_ID=$KEY_QA" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_QA" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_TEST_VAL" >> $GITHUB_OUTPUT
              ;;
            UAT)
              echo "CLIENT_ID=$KEY_UAT" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_UAT" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_TEST_VAL" >> $GITHUB_OUTPUT
              ;;
            PRODUCTION)
              echo "CLIENT_ID=$KEY_PROD" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_PROD" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_PROD_VAL" >> $GITHUB_OUTPUT
              ;;
            HOTFIX)
              echo "CLIENT_ID=$KEY_HOTFIX" >> $GITHUB_OUTPUT
              echo "USERNAME=$USER_HOTFIX" >> $GITHUB_OUTPUT
              echo "LOGIN_URL=$SF_LOGIN_URL_TEST_VAL" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unsupported environment $ENVIRONMENT"
              exit 1
              ;;
          esac

      - name: Clear Prior Salesforce Sessions
        shell: bash
        run: |
          echo "🧹 Clearing existing Salesforce org sessions..."
          sf org logout --all --no-prompt || true

      - name: Authenticate to - ${{ github.event.inputs.environment }} Org
        env:
          CLIENT_ID: ${{ steps.set-org.outputs.CLIENT_ID }}
          USERNAME: ${{ steps.set-org.outputs.USERNAME }}
          LOGIN_URL: ${{ steps.set-org.outputs.LOGIN_URL }}
        run: |
          sf org login jwt \
            --client-id "$CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$USERNAME" \
            --instance-url "$LOGIN_URL" \
            --set-default

      - name: Check Manifest Exists and Prepare Test Classes
        id: prepare-tests
        shell: bash
        env:
          TEST_LEVEL: ${{ env.TEST_LEVEL }}
          FEATURE_BRANCH: ${{ env.FEATURE_BRANCH }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          MANIFEST="${WORKSPACE}/manifest/${FEATURE_BRANCH}_package.xml"
          if [[ ! -f "$MANIFEST" ]]; then
            echo "ERROR: Manifest file $MANIFEST not found."
            exit 1
          fi
          echo "✅ Manifest found: $MANIFEST"

          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" ]]; then
            TEST_CLASS_FILE="${WORKSPACE}/manifest/${FEATURE_BRANCH}_TestClass.txt"
            if [[ ! -f "$TEST_CLASS_FILE" ]]; then
              echo "ERROR: Test class file $TEST_CLASS_FILE not found."
              exit 1
            fi
            TEST_CLASSES=$(paste -sd ' ' "$TEST_CLASS_FILE")
            echo "✅ Test classes: $TEST_CLASSES"
            echo "test_classes=$TEST_CLASSES" >> $GITHUB_OUTPUT
          else
            echo "test_classes=" >> $GITHUB_OUTPUT
          fi

      - name: Validation Deployment - ${{ github.event.inputs.environment }} Org
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
          FEATURE_BRANCH: ${{ env.FEATURE_BRANCH }}
          TEST_LEVEL: ${{ env.TEST_LEVEL }}
          TEST_CLASSES: ${{ steps.prepare-tests.outputs.test_classes }}
          ORG_USERNAME: ${{ steps.set-org.outputs.USERNAME }}
        run: |
          MANIFEST="${WORKSPACE}/manifest/${FEATURE_BRANCH}_package.xml"
          echo "Validating: $MANIFEST"
          CMD=(sf project deploy validate --manifest "$MANIFEST" --target-org "$ORG_USERNAME" --test-level "$TEST_LEVEL" --wait 30 --ignore-warnings --verbose)
          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" && -n "$TEST_CLASSES" ]]; then
            CMD+=(--tests $TEST_CLASSES)
          fi
          "${CMD[@]}"

      - name: Deploy to Salesforce - ${{ github.event.inputs.environment }} Org
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
          FEATURE_BRANCH: ${{ env.FEATURE_BRANCH }}
          TEST_LEVEL: ${{ env.TEST_LEVEL }}
          TEST_CLASSES: ${{ steps.prepare-tests.outputs.test_classes }}
          ORG_USERNAME: ${{ steps.set-org.outputs.USERNAME }}
        run: |
          MANIFEST="${WORKSPACE}/manifest/${FEATURE_BRANCH}_package.xml"
          echo "Deploying: $MANIFEST"
          CMD=(sf project deploy start --manifest "$MANIFEST" --target-org "$ORG_USERNAME" --test-level "$TEST_LEVEL" --wait 10 --ignore-conflicts --coverage-formatters json --results-dir coverage-results)
          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" && -n "$TEST_CLASSES" ]]; then
            CMD+=(--tests $TEST_CLASSES)
          fi
          "${CMD[@]}"

      - name: Check Code Coverage
        if: env.TEST_LEVEL != 'NoTestRun'
        shell: bash
        run: |
          echo "🔍 Searching for coverage file..."
          COVERAGE_FILE=$(find . -name "*.json" -path "*coverage-results*" 2>/dev/null | head -1)
          [[ -z "$COVERAGE_FILE" ]] && COVERAGE_FILE=$(find . -name "coverage*.json" 2>/dev/null | head -1)

          if [[ -n "$COVERAGE_FILE" ]]; then
            echo "📄 Found coverage file: $COVERAGE_FILE"
            COVERAGE=$(jq '
              [to_entries[] | .value.s | to_entries | {total: length, covered: [.[] | select(.value > 0)] | length}]
              | {total: (map(.total) | add), covered: (map(.covered) | add)}
              | if .total > 0 then (.covered * 100 / .total | floor) else 0 end
            ' "$COVERAGE_FILE" 2>/dev/null || echo "")

            echo ""
            echo "=========================================="
            echo "CODE COVERAGE REPORT"
            echo "=========================================="
            jq -r '
              to_entries[] |
              .key as $class |
              .value.s | to_entries |
              {class: $class, total: length, covered: ([.[] | select(.value > 0)] | length)} |
              "\(.class): \(.covered)/\(.total) lines covered (\(if .total > 0 then (.covered * 100 / .total | floor) else 0 end)%)"
            ' "$COVERAGE_FILE" 2>/dev/null || true
            echo "=========================================="
          fi

          if [[ -z "$COVERAGE" || "$COVERAGE" == "null" || "$COVERAGE" == "0" ]]; then
            COVERAGE=$(grep -oP '\d+(?=%)' deploy-result.txt 2>/dev/null | tail -1 || echo "")
          fi

          if [[ -z "$COVERAGE" || "$COVERAGE" == "null" ]]; then
            echo "⚠️ Could not determine code coverage"
            exit 0
          fi

          echo "📊 Overall Code Coverage: ${COVERAGE}%"
          if [[ "$COVERAGE" -lt 80 ]]; then
            echo "❌ Code coverage ${COVERAGE}% is below minimum threshold of 80%"
            exit 1
          else
            echo "✅ Code coverage ${COVERAGE}% meets minimum threshold of 80%"
          fi

      - name: Cleanup JWT key
        if: always()
        run: rm -f server.key

  Deploy_Hotfix_After_Prod:
    runs-on: ubuntu-latest
    needs: Deployment_Build
    if: >
      needs.Deployment_Build.result == 'success' &&
      github.event.inputs.environment == 'PRODUCTION' &&
      github.ref == 'refs/heads/main'

    env:
      SF_LOGIN_URL_TEST: https://test.salesforce.com

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version

      - name: Generate JWT private key file
        run: |
          echo "${{ secrets.SALESFORCE_JWT_SECRET_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Hotfix Org
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SALESFORCE_CONSUMER_KEY_HOTFIX }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SFDX_AUTH_HOTFIX_USERNAME }}" \
            --instance-url "${{ env.SF_LOGIN_URL_TEST }}" \
            --set-default

      - name: Deploy to Hotfix Org
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
          DEPLOY_PACKAGE: ${{ needs.Deployment_Build.outputs.deploy_package }}
          ORG_USERNAME: ${{ secrets.SFDX_AUTH_HOTFIX_USERNAME }}
        run: |
          MANIFEST="${WORKSPACE}/manifest/${DEPLOY_PACKAGE}_package.xml"
          echo "Deploying to HOTFIX: $MANIFEST"
          sf project deploy start --manifest "$MANIFEST" --target-org "$ORG_USERNAME" --test-level NoTestRun --wait 10 --ignore-conflicts

      - name: Cleanup JWT key
        if: always()
        run: rm -f server.key

  Update_Release_Notes:
    runs-on: ubuntu-latest
    needs: Deployment_Build
    if: needs.Deployment_Build.result == 'success'

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
      ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Extract Jira Tickets from Commits
        id: extract_tickets
        shell: bash
        run: |
          echo "🔍 Extracting Jira ticket IDs from recent commits..."
          TICKETS=$(git log --oneline -50 | grep -oP '[A-Z]+-\d+' | sort -u | tr '\n' ',' | sed 's/,$//')
          if [[ -z "$TICKETS" ]]; then
            echo "⚠️ No Jira tickets found in recent commits"
            echo "has_tickets=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Found tickets: $TICKETS"
            echo "tickets=$TICKETS" >> "$GITHUB_OUTPUT"
            echo "has_tickets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Jira Details and Update Confluence
        if: steps.extract_tickets.outputs.has_tickets == 'true'
        shell: bash
        env:
          TICKETS: ${{ steps.extract_tickets.outputs.tickets }}
          ENVIRONMENT: ${{ needs.Deployment_Build.outputs.environment }}
          PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}
        run: |
          echo "📋 Fetching Jira ticket details..."

          RELEASE_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          DEPLOYER="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          PACKAGE="${{ needs.Deployment_Build.outputs.deploy_package }}"

          RELEASE_HTML="<h2>🚀 Release - ${ENVIRONMENT} | ${RELEASE_DATE}</h2>"
          RELEASE_HTML+="<p><strong>Deployed by:</strong> ${DEPLOYER} | <strong>Branch:</strong> ${BRANCH} | <strong>Package:</strong> ${PACKAGE}</p>"
          RELEASE_HTML+="<table><tr><th>Ticket</th><th>Summary</th><th>Type</th><th>Status</th><th>Priority</th></tr>"

          IFS=',' read -ra TICKET_ARRAY <<< "$TICKETS"
          TICKET_COUNT=0

          for TICKET in "${TICKET_ARRAY[@]}"; do
            echo "  Fetching: $TICKET"
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -u "${JIRA_USER_EMAIL}:${ATLASSIAN_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}?fields=summary,issuetype,status,priority")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [[ "$HTTP_CODE" == "200" ]]; then
              SUMMARY=$(echo "$BODY" | jq -r '.fields.summary // "N/A"')
              ISSUE_TYPE=$(echo "$BODY" | jq -r '.fields.issuetype.name // "N/A"')
              STATUS=$(echo "$BODY" | jq -r '.fields.status.name // "N/A"')
              PRIORITY=$(echo "$BODY" | jq -r '.fields.priority.name // "N/A"')
              TICKET_URL="${JIRA_BASE_URL}/browse/${TICKET}"
              RELEASE_HTML+="<tr><td><a href=\"${TICKET_URL}\">${TICKET}</a></td><td>${SUMMARY}</td><td>${ISSUE_TYPE}</td><td>${STATUS}</td><td>${PRIORITY}</td></tr>"
              TICKET_COUNT=$((TICKET_COUNT + 1))
            else
              echo "    ⚠️ Could not fetch $TICKET (HTTP $HTTP_CODE)"
              RELEASE_HTML+="<tr><td>${TICKET}</td><td colspan=\"4\">Could not fetch details</td></tr>"
            fi
          done

          RELEASE_HTML+="</table><p><em>Total tickets: ${TICKET_COUNT}</em></p><hr/>"
          echo "✅ Built release notes for ${TICKET_COUNT} tickets"

          echo "📄 Fetching current Confluence page..."
          PAGE_RESPONSE=$(curl -s \
            -u "${JIRA_USER_EMAIL}:${ATLASSIAN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${CONFLUENCE_BASE_URL}/rest/api/content/${PAGE_ID}?expand=body.storage,version")

          CURRENT_VERSION=$(echo "$PAGE_RESPONSE" | jq -r '.version.number')
          CURRENT_BODY=$(echo "$PAGE_RESPONSE" | jq -r '.body.storage.value')
          PAGE_TITLE=$(echo "$PAGE_RESPONSE" | jq -r '.title')

          if [[ -z "$CURRENT_VERSION" || "$CURRENT_VERSION" == "null" ]]; then
            echo "❌ Failed to fetch Confluence page"
            echo "$PAGE_RESPONSE"
            exit 1
          fi

          NEW_VERSION=$((CURRENT_VERSION + 1))
          echo "📝 Updating: $PAGE_TITLE (v$CURRENT_VERSION → v$NEW_VERSION)"

          NEW_BODY="${RELEASE_HTML}${CURRENT_BODY}"
          NEW_BODY_ESCAPED=$(echo "$NEW_BODY" | jq -Rs .)

          UPDATE_PAYLOAD=$(cat <<EOF
          {
            "version": { "number": ${NEW_VERSION} },
            "title": "${PAGE_TITLE}",
            "type": "page",
            "body": {
              "storage": {
                "value": ${NEW_BODY_ESCAPED},
                "representation": "storage"
              }
            }
          }
          EOF
          )

          UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT \
            -u "${JIRA_USER_EMAIL}:${ATLASSIAN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$UPDATE_PAYLOAD" \
            "${CONFLUENCE_BASE_URL}/rest/api/content/${PAGE_ID}")

          UPDATE_CODE=$(echo "$UPDATE_RESPONSE" | tail -1)

          if [[ "$UPDATE_CODE" == "200" ]]; then
            echo "✅ Confluence page updated successfully!"
            echo "🔗 ${CONFLUENCE_BASE_URL}/pages/viewpage.action?pageId=${PAGE_ID}"
          else
            echo "❌ Failed to update Confluence page (HTTP $UPDATE_CODE)"
            echo "$UPDATE_RESPONSE" | sed '$d'
            exit 1
          fi

      - name: No Tickets Found
        if: steps.extract_tickets.outputs.has_tickets != 'true'
        run: |
          echo "⚠️ No Jira tickets found in recent commits."
          echo "Ensure commit messages contain ticket IDs (e.g., LODHA-123)"
