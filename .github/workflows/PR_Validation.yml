name: PR Validation Against Destination Org

on:
  pull_request:
    branches:
      - DEV
      - QA
      - UAT
      - main

jobs:
  # Job 1: Check if PR is from main branch
  check_source_branch:
    name: Check PR Source Branch
    runs-on: ubuntu-latest
    outputs:
      should_validate: ${{ steps.verify.outputs.should_validate }}
    
    steps:
      - name: Verify Source Branch
        id: verify
        shell: bash
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          echo "PR Source Branch: $SOURCE_BRANCH"
          
          if [[ "$SOURCE_BRANCH" == "main" ]]; then
            echo "❌ PR from 'main' branch detected - SKIPPING validation"
            echo "should_validate=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ PR from '$SOURCE_BRANCH' - ALLOWING validation"
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
          fi

  # Job 2: Skip notification
  notify_main_skip:
    name: Notify - Validation Skipped
    needs: check_source_branch
    if: needs.check_source_branch.outputs.should_validate == 'false'
    runs-on: ubuntu-latest
    
    steps:
      - name: Validation Skipped
        shell: bash
        run: |
          echo "=========================================="
          echo "⚠️  VALIDATION SKIPPED"
          echo "=========================================="
          echo "PR Raised from 'main' branch"
          echo "Please run Validation for Feature Branch"
          echo "=========================================="

  # Job 3: Main validation job
  Pre_Validation_Build:
    needs: check_source_branch
    if: needs.check_source_branch.outputs.should_validate == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Generate JWT Key File
        run: |
          echo "${{ secrets.SALESFORCE_JWT_SECRET_KEY }}" > server.key
          chmod 600 server.key

      - name: Set Source and Destination Branch
        shell: bash
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          DEST_BRANCH: ${{ github.base_ref }}
        run: |
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> "$GITHUB_ENV"
          echo "DEST_BRANCH=$DEST_BRANCH" >> "$GITHUB_ENV"

      - name: Select Salesforce Org Based on Destination Branch
        shell: bash
        env:
          DEST_BRANCH: ${{ env.DEST_BRANCH }}
          AUTH_DEV_USERNAME: ${{ secrets.SFDX_AUTH_DEV_USERNAME }}
          AUTH_QA_USERNAME: ${{ secrets.SFDX_AUTH_QA_USERNAME }}
          AUTH_UAT_USERNAME: ${{ secrets.SFDX_AUTH_UAT_USERNAME }}
          AUTH_PROD_USERNAME: ${{ secrets.SFDX_AUTH_PROD_USERNAME }}
          SANDBOX_URL: ${{ secrets.SANDBOX_URL }}
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          CONSUMER_KEY_DEV: ${{ secrets.SALESFORCE_CONSUMER_KEY_DEV }}
          CONSUMER_KEY_QA: ${{ secrets.SALESFORCE_CONSUMER_KEY_QA }}
          CONSUMER_KEY_UAT: ${{ secrets.SALESFORCE_CONSUMER_KEY_UAT }}
          CONSUMER_KEY_PROD: ${{ secrets.SALESFORCE_CONSUMER_KEY_PROD }}
        run: |
          case "$DEST_BRANCH" in
            DEV)
              echo "SF_USERNAME=$AUTH_DEV_USERNAME" >> "$GITHUB_ENV"
              echo "SF_INSTANCE_URL=$SANDBOX_URL" >> "$GITHUB_ENV"
              echo "SF_CLIENT_ID=$CONSUMER_KEY_DEV" >> "$GITHUB_ENV"
              echo "TARGET_ORG_NAME=DEV" >> "$GITHUB_ENV"
              echo "🎯 Target Org: DEV"
              ;;
            QA)
              echo "SF_USERNAME=$AUTH_QA_USERNAME" >> "$GITHUB_ENV"
              echo "SF_INSTANCE_URL=$SANDBOX_URL" >> "$GITHUB_ENV"
              echo "SF_CLIENT_ID=$CONSUMER_KEY_QA" >> "$GITHUB_ENV"
              echo "TARGET_ORG_NAME=QA" >> "$GITHUB_ENV"
              echo "🎯 Target Org: QA"
              ;;
            UAT)
              echo "SF_USERNAME=$AUTH_UAT_USERNAME" >> "$GITHUB_ENV"
              echo "SF_INSTANCE_URL=$SANDBOX_URL" >> "$GITHUB_ENV"
              echo "SF_CLIENT_ID=$CONSUMER_KEY_UAT" >> "$GITHUB_ENV"
              echo "TARGET_ORG_NAME=UAT" >> "$GITHUB_ENV"
              echo "🎯 Target Org: UAT"
              ;;
            main)
              echo "SF_USERNAME=$AUTH_PROD_USERNAME" >> "$GITHUB_ENV"
              echo "SF_INSTANCE_URL=$LOGIN_URL" >> "$GITHUB_ENV"
              echo "SF_CLIENT_ID=$CONSUMER_KEY_PROD" >> "$GITHUB_ENV"
              echo "TARGET_ORG_NAME=PRODUCTION" >> "$GITHUB_ENV"
              echo "🎯 Target Org: PRODUCTION"
              ;;
            *)
              echo "❌ Invalid target branch: $DEST_BRANCH"
              exit 1
              ;;
          esac

      - name: Clear Prior Salesforce Sessions
        shell: bash
        run: |
          echo "🧹 Clearing existing Salesforce org sessions..."
          sf org logout --all --no-prompt || true

      - name: Authenticate Salesforce - ${{ env.TARGET_ORG_NAME }} Org
        shell: bash
        run: |
          echo "🔐 Authenticating with Salesforce..."
          sf org login jwt \
            --client-id "$SF_CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$SF_USERNAME" \
            --instance-url "$SF_INSTANCE_URL" \
            --set-default
          
          if [[ $? -eq 0 ]]; then
            echo "✅ Successfully authenticated with Salesforce"
          else
            echo "❌ Authentication failed"
            exit 1
          fi

      - name: Check if Package Manifest Exists
        id: check_package
        shell: bash
        run: |
          PKG_MANIFEST="${GITHUB_WORKSPACE}/manifest/${SOURCE_BRANCH}_package.xml"
          
          echo "Checking for package manifest at: $PKG_MANIFEST"
          
          if [[ -f "$PKG_MANIFEST" ]]; then
            echo "✅ Package manifest found: $PKG_MANIFEST"
            echo "package_exists=true" >> "$GITHUB_OUTPUT"
            echo "package_path=$PKG_MANIFEST" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Package manifest not found"
            echo "Expected location: $PKG_MANIFEST"
            echo ""
            echo "Please ensure the following file exists in your repository:"
            echo "  manifest/${SOURCE_BRANCH}_package.xml"
            echo ""
            echo "package_exists=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Prepare Test Classes
        id: prepare_manifest
        shell: bash
        env:
          MANIFEST_PATH: ${{ steps.check_package.outputs.package_path }}
        run: |
          TEST_CLASS_FILE="${GITHUB_WORKSPACE}/manifest/${SOURCE_BRANCH}_TestClass.txt"

          echo "Checking for test class file at: $TEST_CLASS_FILE"
          
          if [[ -f "$TEST_CLASS_FILE" ]]; then
            TEST_CLASSES=$(<"$TEST_CLASS_FILE")
            
            # Trim leading/trailing whitespace and newlines
            TEST_CLASSES="${TEST_CLASSES#"${TEST_CLASSES%%[![:space:]]*}"}"
            TEST_CLASSES="${TEST_CLASSES%"${TEST_CLASSES##*[![:space:]]}"}"

            if [[ -z "$TEST_CLASSES" ]]; then
              echo "❌ Test class file is empty"
              echo "Expected location: $TEST_CLASS_FILE"
              echo ""
              echo "Please ensure the test class file contains test class names"
              echo "Format: One test class per line or space-separated"
              echo ""
              exit 1
            fi

            echo "✅ Test class file found"
            echo "✅ Test classes detected: $TEST_CLASSES"
            echo "test_classes=$TEST_CLASSES" >> "$GITHUB_OUTPUT"
            echo "test_level=RunSpecifiedTests" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Test class file not found"
            echo "Expected location: $TEST_CLASS_FILE"
            echo ""
            echo "Please ensure the following file exists in your repository:"
            echo "  manifest/${SOURCE_BRANCH}_TestClass.txt"
            echo ""
            echo "Validation requires a test class file with explicit test classes"
            exit 1
          fi
          
          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Validate Deployment - ${{ env.TARGET_ORG_NAME }} Org
        id: validate
        shell: bash
        env:
          TEST_LEVEL: ${{ steps.prepare_manifest.outputs.test_level }}
          TEST_CLASSES: ${{ steps.prepare_manifest.outputs.test_classes }}
          MANIFEST_PATH: ${{ steps.prepare_manifest.outputs.manifest_path }}
          SF_USERNAME: ${{ env.SF_USERNAME }}
        run: |
          echo ""
          echo "=========================================="
          echo "VALIDATION CONFIGURATION"
          echo "=========================================="
          echo "Package Manifest: $MANIFEST_PATH"
          echo "Test Level: $TEST_LEVEL"
          echo "Test Classes: $TEST_CLASSES"
          echo "=========================================="
          echo ""
          echo "🚀 Starting deployment validation..."
          echo ""
          
          read -ra tests_array <<< "$TEST_CLASSES"

          CMD=(sf project deploy validate --target-org "$SF_USERNAME" --manifest "$MANIFEST_PATH" --wait 60 --ignore-warnings --test-level "$TEST_LEVEL")

          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" && ${#tests_array[@]} -gt 0 ]]; then
            CMD+=(--tests)
            for test in "${tests_array[@]}"; do
              CMD+=("$test")
            done
          fi

          CMD+=(--verbose)

          echo "Executing command:"
          echo "${CMD[@]}"
          echo ""
          
          set +e
          "${CMD[@]}" | tee deploy-result.txt
          VALIDATION_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "VALIDATION_EXIT_CODE=$VALIDATION_EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Display Validation Result
        shell: bash
        env:
          EXIT_CODE: ${{ steps.validate.outputs.VALIDATION_EXIT_CODE }}
        run: |
          if [[ ! -f deploy-result.txt ]]; then
            echo "❌ No result output generated"
            exit 1
          fi
          
          echo ""
          echo "=========================================="
          echo "VALIDATION RESULT"
          echo "=========================================="
          echo ""

          if [[ "$EXIT_CODE" == "0" ]]; then
            echo "✅ VALIDATION PASSED SUCCESSFULLY"
            echo ""
            echo "The package validation was successful!"
            echo "=========================================="
            exit 0
          else
            echo "❌ VALIDATION FAILED"
            echo ""
            echo "Exit Code: $EXIT_CODE"
            echo ""
            echo "Error details:"
            echo "---"
            grep -i "error\|failed" deploy-result.txt | head -30 || true
            echo "---"
            echo ""
            echo "=========================================="
            exit 1
          fi

      - name: Install Salesforce Code Analyzer plugin
        run: sf plugins install @salesforce/sfdx-scanner@latest
        
      - name: Run Salesforce Code Analyzer
        id: run-scanner
        uses: forcedotcom/run-code-analyzer@v2
        with:
          run-command: run
          run-arguments: --normalize-severity --target . --outfile results.json --json --verbose
          results-artifact-name: salesforce-code-analyzer-results

      - name: Display Salesforce Scanner Report
        run: |
          echo "| Rule Id | Severity | File | Line | Message |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|------|------|---------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.[] | "|"+(.ruleId // "N/A")+"|"+(.severity // "N/A")+"|"+(.file // "N/A")+"|"+((.line|tostring) // "N/A")+"|"+(.message // "N/A")+"|"' results.json >> $GITHUB_STEP_SUMMARY
          
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks Scan
        run: |
          gitleaks detect --source . --config .gitleaks.toml --report-format sarif --report-path gitleaks-report.sarif --verbose
          echo "✅ No secrets detected"

      - name: Upload Scan Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 30

      - name: Remove JWT Key File
        if: always()
        shell: bash
        run: |
          if [[ -f server.key ]]; then
            rm -f server.key
            echo "✅ JWT key file cleaned up"
          fi
